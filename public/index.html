<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Financial PDF Extractor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* ── Index-page specific overrides ── */
        html,
        body {
            height: 100%;
            overflow: hidden;
            /* prevent scroll on the upload page */
        }

        .upload-page-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .upload-page-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .upload-page-header h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            margin-bottom: 0.4rem;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .upload-page-header p {
            color: var(--text-secondary);
            font-size: clamp(0.9rem, 2vw, 1.05rem);
            max-width: 520px;
            margin: 0 auto;
        }

        .upload-card {
            width: 100%;
            max-width: 680px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            padding: 1.8rem 2rem;
        }

        .upload-area-compact {
            border: 2px dashed var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.8rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
        }

        .upload-area-compact:hover,
        .upload-area-compact.dragover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area-compact .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.6rem;
        }

        .upload-area-compact .upload-icon svg {
            width: 44px;
            height: 44px;
        }

        .upload-area-compact h3 {
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }

        .upload-area-compact p {
            font-size: 0.85rem;
            margin-bottom: 0.9rem;
        }

        .upload-footer-note {
            text-align: center;
            margin-top: 0.8rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Compact input group spacing inside card */
        .upload-card .input-group {
            margin-bottom: 1rem;
        }

        /* Compact action area */
        .upload-card .action-area {
            margin-top: 1rem;
        }

        /* Compact file list */
        #fileList {
            margin-top: 0.8rem;
            max-height: 120px;
            overflow-y: auto;
        }

        /* Compact messages */
        #processing {
            margin-top: 1rem;
        }

        #error {
            margin-top: 0.8rem;
        }

        /* Allow scrolling only if content truly overflows on very small screens */
        @media (max-height: 600px) {

            html,
            body {
                overflow: auto;
            }

            .upload-page-wrapper {
                height: auto;
                padding-top: 1rem;
                padding-bottom: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="upload-page-wrapper fade-in">
        <!-- Header -->
        <div class="upload-page-header">
            <h1>AI Financial Extractor</h1>
            <p>Transform your bank statements into actionable data. Upload your PDFs and let our AI do the heavy
                lifting.</p>
        </div>

        <!-- Upload Card -->
        <div class="upload-card">
            <!-- User ID Input -->
            <div class="input-group">
                <label class="input-label" for="userId">USER IDENTIFIER</label>
                <input type="text" id="userId" class="form-input" placeholder="e.g. user_123" value="user123">
            </div>

            <!-- Upload Area -->
            <div class="upload-area-compact" id="uploadArea">
                <div class="upload-icon">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="background: var(--secondary-gradient); -webkit-background-clip: text; background-clip: text;">
                        <path d="M12 16L12 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M9 11L12 8 15 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M8 16H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path
                            d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3Z"
                            stroke="currentColor" stroke-width="2" />
                    </svg>
                </div>
                <h3 style="color: white;">Drop your PDF statements here</h3>
                <p style="color: var(--text-muted);">Support for all major bank formats</p>
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">
                    Browse Files
                </button>
                <input type="file" id="fileInput" class="hidden" accept=".pdf" multiple>
            </div>

            <!-- File List -->
            <div id="fileList"></div>

            <!-- Action Area -->
            <div class="action-area">
                <button class="btn btn-primary" id="uploadBtn" disabled style="width: 100%;">
                    Process Documents
                </button>
            </div>

            <!-- Messages -->
            <div id="processing" class="hidden" style="text-align: center; margin-top: 1rem;">
                <div class="spinner"></div>
                <p style="color: var(--text-secondary);">Analyzing transactions...</p>
            </div>

            <div id="error" class="hidden"
                style="margin-top: 0.8rem; color: var(--accent-danger); background: rgba(239, 68, 68, 0.1); padding: 0.8rem; border-radius: var(--radius-sm); text-align: center;">
            </div>
        </div>

        <!-- Footer -->
        <div class="upload-footer-note">
            <p>Secure &bull; Private &bull; Automated</p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/cursor.js"></script>
</body>

</html>
